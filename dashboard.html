<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>女娲 · AI短剧工厂</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
}
canvas#bg { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
.container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px; }

/* Header */
.header { text-align: center; padding: 40px 0 20px; }
.header h1 {
  font-size: 2.4em;
  background: linear-gradient(135deg, #a855f7, #6366f1, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .subtitle { color: #888; font-size: 0.95em; margin-top: 6px; }
.header .badge { display: inline-block; background: rgba(168,85,247,0.12); color: #a855f7; font-size: 0.8em; padding: 4px 12px; border-radius: 20px; margin-top: 10px; border: 1px solid rgba(168,85,247,0.25); }

/* Input */
.input-area {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 32px;
}
.input-area .row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.input-area .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; }
.input-area label { font-size: 0.8em; color: #888; }
.input-area input, .input-area select {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  color: #e0e0e0;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 0.95em;
  outline: none;
  transition: border 0.2s;
}
.input-area input:focus, .input-area select:focus { border-color: #a855f7; }
.input-area input { flex: 2; }
.input-area select { cursor: pointer; }
.btn {
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  color: #fff;
  border: none;
  padding: 10px 28px;
  border-radius: 10px;
  font-size: 0.95em;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.25s;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.3); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn.reset { background: rgba(255,255,255,0.08); color: #ccc; }

/* Pipeline */
.pipeline { margin-bottom: 32px; }
.pipeline h2 { font-size: 1.1em; color: #999; margin-bottom: 16px; font-weight: 400; }

.stages {
  display: flex;
  gap: 0;
  flex-wrap: wrap;
  justify-content: center;
}
.stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  flex: 1;
  min-width: 90px;
  max-width: 130px;
}
.stage .node {
  width: 64px; height: 64px;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6em;
  transition: all 0.4s;
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(255,255,255,0.08);
  position: relative;
  z-index: 2;
}
.stage .node.running {
  background: rgba(124,58,237,0.15); border-color: #7c3aed;
  box-shadow: 0 0 20px rgba(124,58,237,0.3); animation: pulse 1.5s infinite;
}
.stage .node.done {
  background: rgba(34,197,94,0.12); border-color: #22c55e;
}
.stage .node.done::after {
  content: "✓"; position: absolute; top: -6px; right: -6px;
  width: 20px; height: 20px; background: #22c55e; border-radius: 50%;
  font-size: 11px; color: #fff; display: flex; align-items: center; justify-content: center;
}
.stage .label {
  margin-top: 8px;
  font-size: 0.72em;
  color: #666;
  text-align: center;
  line-height: 1.3;
  font-weight: 500;
}
.stage .label.done { color: #4ade80; }
.stage .label.running { color: #a855f7; }

.connector {
  display: flex; align-items: center;
  min-width: 24px; height: 64px;
  position: relative; z-index: 1;
}
.connector .line {
  width: 100%; height: 2px;
  background: rgba(255,255,255,0.06);
  transition: background 0.5s;
}
.connector .line.done { background: rgba(34,197,94,0.4); }
.connector .line.running { background: linear-gradient(90deg, rgba(34,197,94,0.4), rgba(124,58,237,0.5)); }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 20px rgba(124,58,237,0.3); }
  50% { box-shadow: 0 0 36px rgba(124,58,237,0.55); }
}

/* Progress bar */
.progress-bar {
  margin: 20px 0 32px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px; height: 6px;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #7c3aed, #a855f7);
  border-radius: 8px;
  transition: width 0.5s;
}

/* Output */
.output-area { display: flex; gap: 16px; flex-wrap: wrap; }
.output-card {
  flex: 1; min-width: 300px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  overflow: hidden;
}
.output-card .card-header {
  padding: 14px 18px;
  background: rgba(255,255,255,0.03);
  font-size: 0.85em;
  color: #888;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; gap: 8px;
}
.output-card .card-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
.output-card .card-header .dot.active { background: #7c3aed; animation: pulse 1.5s infinite; }
.output-card .card-header .dot.done { background: #22c55e; }
.output-card .card-body {
  padding: 16px 18px;
  font-size: 0.88em;
  line-height: 1.7;
  color: #bbb;
  max-height: 420px;
  overflow-y: auto;
}
.output-card .card-body pre {
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  padding: 12px;
  font-size: 0.82em;
  overflow-x: auto;
  color: #a5b4fc;
  white-space: pre-wrap;
  word-break: break-all;
}
.output-card .card-body h3 { color: #e0e0e0; font-size: 1em; margin-bottom: 8px; }
.output-card .card-body .tag {
  display: inline-block; background: rgba(124,58,237,0.12); color: #a855f7;
  padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin: 2px;
  border: 1px solid rgba(124,58,237,0.2);
}

/* Footer */
.footer {
  text-align: center; padding: 40px 0;
  color: #555; font-size: 0.78em;
}

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: #666; }
.empty-state .icon { font-size: 3em; margin-bottom: 12px; opacity: 0.5; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>女娲 · AI短剧工厂</h1>
    <div class="subtitle">一键从创意到发布 — 8站专家级流水线</div>
    <div class="badge">8/8 全线通车</div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="row">
      <div class="field" style="flex:3">
        <label>🎯 你的创意</label>
        <input id="ideaInput" type="text" placeholder="例如：加班改17版方案，功劳被关系户抢了…">
      </div>
      <div class="field" style="flex:1.5">
        <label>🎬 题材</label>
        <select id="genreSelect">
          <option value="auto">自动匹配</option>
          <option value="都市逆袭">都市逆袭</option>
          <option value="古风仙侠">古风仙侠</option>
          <option value="甜宠恋爱">甜宠恋爱</option>
          <option value="悬疑反转">悬疑反转</option>
          <option value="搞笑沙雕">搞笑沙雕</option>
          <option value="科幻末世">科幻末世</option>
        </select>
      </div>
      <div class="field" style="flex:1.5">
        <label>🎥 视觉风格</label>
        <select id="styleSelect">
          <option value="auto">自动匹配</option>
          <option value="wong">王家卫（情绪霓虹）</option>
          <option value="anderson">韦斯·安德森（对称纪律）</option>
          <option value="apocalyptic">末世科幻（废土朋克）</option>
        </select>
      </div>
      <div class="field" style="flex:0.8">
        <label>⏱ 时长</label>
        <select id="durationSelect">
          <option value="1min">1分钟</option>
          <option value="2min">2分钟</option>
          <option value="3min">3分钟</option>
        </select>
      </div>
      <div class="field" style="flex:0.6; justify-content:flex-end;">
        <button class="btn" id="startBtn" onclick="startPipeline()">▶ 一键启动</button>
      </div>
      <div class="field" style="flex:0.6; justify-content:flex-end;">
        <button class="btn reset" id="resetBtn" onclick="resetPipeline()" disabled>↺ 重置</button>
      </div>
    </div>
  </div>

  <!-- Pipeline -->
  <div class="pipeline">
    <h2>流水线 · Pipeline</h2>
    <div class="stages" id="stagesContainer"></div>
    <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
  </div>

  <!-- Output -->
  <div class="output-area">
    <div class="output-card">
      <div class="card-header"><span class="dot" id="dotCurrent"></span>当前阶段输出</div>
      <div class="card-body" id="currentOutput">
        <div class="empty-state">
          <div class="icon">🐚</div>
          <div>输入你的创意，点击「一键启动」</div>
        </div>
      </div>
    </div>
    <div class="output-card">
      <div class="card-header"><span class="dot done"></span>全链路数据（pipeline.json）</div>
      <div class="card-body" id="jsonOutput">
        <div class="empty-state">
          <div class="icon">📦</div>
          <div>项目数据将在此展示</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">女娲 · AI短剧工厂 v1.0 | 8站蒸馏专家 · 一键到发布</div>
</div>

<script>
// ======== Background Canvas ========
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let particles = [];
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.size = Math.random() * 1.5 + 0.5;
    this.opacity = Math.random() * 0.3 + 0.05;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(168,85,247,${this.opacity})`;
    ctx.fill();
  }
}
for (let i = 0; i < 60; i++) particles.push(new Particle());

function animateBg() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  // Connect nearby particles
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(124,58,237,${0.06 * (1 - dist / 120)})`;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animateBg);
}
animateBg();

// ======== Pipeline Config ========
const stages = [
  { id: 'hotspot',     emoji: '🔍', label: '热点发现', desc: '扫描热榜，拆解情绪' },
  { id: 'script',      emoji: '✍️', label: '短剧编剧', desc: '四阶段流，15镜剧本' },
  { id: 'cinema',      emoji: '🎬', label: '画面指令', desc: '7模块Prompt，角色卡' },
  { id: 'image',       emoji: '🖼️', label: '生图执行', desc: 'CHAR资产库，分镜图' },
  { id: 'video',       emoji: '🎥', label: '生视频', desc: '运镜词典，首尾帧链' },
  { id: 'editing',     emoji: '✂️', label: '剪辑节奏', desc: '3-5-15-40网格，转场' },
  { id: 'sound',       emoji: '🎵', label: '声音设计', desc: 'BGM速配，三明治音轨' },
  { id: 'publish',     emoji: '🚀', label: '发布运营', desc: '标题钩子，封面标签' },
];

let pipelineState = {};
let running = false;
let currentStage = -1;
let timeoutHandles = [];

// ======== Init Pipeline UI ========
function buildPipeline() {
  const container = document.getElementById('stagesContainer');
  container.innerHTML = '';
  stages.forEach((s, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      conn.innerHTML = '<div class="line" id="line' + i + '"></div>';
      container.appendChild(conn);
    }
    const div = document.createElement('div');
    div.className = 'stage';
    div.innerHTML = `
      <div class="node" id="node${s.id}">${s.emoji}</div>
      <div class="label" id="label${s.id}">${s.label}<br><small>${s.desc}</small></div>
    `;
    container.appendChild(div);
  });
}

// ======== Start Pipeline ========
async function startPipeline() {
  if (running) return;
  const idea = document.getElementById('ideaInput').value.trim();
  if (!idea) { alert('请先输入你的创意！'); return; }

  running = true;
  currentStage = -1;
  pipelineState = {
    project_id: 'nuwa-' + Date.now(),
    created_at: new Date().toISOString(),
    user_input: idea,
    genre: document.getElementById('genreSelect').value,
    style: document.getElementById('styleSelect').value,
    duration: document.getElementById('durationSelect').value,
    stages: {}
  };
  stages.forEach(s => { pipelineState.stages[s.id] = { status: 'pending', output: null }; });

  document.getElementById('startBtn').disabled = true;
  document.getElementById('resetBtn').disabled = true;
  updateUI();

  // Run stages sequentially
  for (let i = 0; i < stages.length; i++) {
    currentStage = i;
    const stage = stages[i];
    pipelineState.stages[stage.id].status = 'running';
    updateUI();
    updateCurrentOutput(stage, 'running');

    // Simulate work with progressive output
    const output = generateFakeOutput(stage, i, idea);
    pipelineState.stages[stage.id].output = output;
    
    // Artificial delay to show progress
    await sleep(800 + Math.random() * 600);
    
    pipelineState.stages[stage.id].status = 'done';
    updateUI();
    updateCurrentOutput(stage, 'done', output);
  }

  currentStage = -1;
  running = false;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('resetBtn').disabled = false;
  document.getElementById('dotCurrent').className = 'dot done';
  updateJsonOutput();
  updateCurrentOutput(null, 'done', null, true);
}

function generateFakeOutput(stage, index, idea) {
  const genre = document.getElementById('genreSelect').value === 'auto' ? '都市逆袭' : document.getElementById('genreSelect').value;
  const style = document.getElementById('styleSelect').value;
  const dur = document.getElementById('durationSelect').value;

  const outputs = {
    hotspot: {
      emotion_engine: { core: "愤怒（被背叛）", curve: "压抑 → 爆发 → 逆袭爽感" },
      four_d: { emotion: "愤怒→委屈→决断", conflict: "能干员工 vs 抢功关系户", persona: "女主：被低估的职场女性" },
      adaptation: { genre: genre, diff_angle: "不报复，只选择——她带着客户一起走" }
    },
    script: {
      format: dur === '1min' ? '15镜短片' : dur === '2min' ? '20镜短片' : '30镜短片',
      episode: 1, scenes: 3, characters: ["女主", "老板", "关系户", "猎头/新机遇"],
      key_beats: ["深夜改方案", "方案被冒名", "撕工牌", "猎头短信", "新公司开价80万"]
    },
    cinema: {
      director_mode: style === 'auto' ? (genre === '科幻末世' ? 'apocalyptic' : 'wong') : style,
      total_shots: dur === '1min' ? 15 : dur === '2min' ? 20 : 30,
      char_card: "鹅蛋脸，丹凤眼，冷白皮，28岁女，黑色西装裙+白衬衫",
      sample_prompt: "Slow dolly in toward a young woman at office desk 2AM. Her face lit by monitor glow, expression shifting from tired to shocked. 35mm film grain, soft focus."
    },
    image: {
      toolchain: "平民链路 — 即梦 S2.0 Pro",
      strategy: "CHAR资产库 → 3S抽卡流水线",
      per_shot: { seed: "固定种子123456", model: "即梦S2.0", steps: 30 },
      consistency: "角色卡片200词级别 + 定妆照参考图"
    },
    video: {
      tool: "可灵 3.0",
      camera_moves: ["慢推(low push)", "固定→微摇", "环绕揭示"],
      per_clip: { motion_strength: "中低档", duration: "4-6秒", frame_control: "首尾帧链" },
      chain_continuity: "Shot1最后一帧 = Shot2首帧 → 全链锁定"
    },
    editing: {
      rhythm_grid: "3s钩子 → 5s惊喜 → 15s反转 → 40s高潮",
      transitions: ["硬切(80%)", "叠化(15%)", "光闪转场(5%)"],
      subtitles: "白字+黑色粗描边，竖屏底部安全区，每行8-10字",
      export: "抖音 1080×1920 30fps 10-15Mbps H.264"
    },
    sound: {
      bgm: { emotion: "悬疑→燃", keywords: ["低沉钢琴(悬念段)", "史诗管弦(逆袭段)"] },
      sfx: ["键盘敲击声(深夜加班)", "手机振动(猎头短信)", "心跳加速(方案被冒名)"],
      voiceover: { tool: "剪映文本朗读", timbre: "情感女声", speed: 1.0 },
      volume: "人声-6dB / 音效-12dB / BGM-22dB"
    },
    publish: {
      title: { primary: `她改${Math.floor(Math.random()*5+15)}版方案后，老板把功劳给了关系户…`, ab_test: ["绝了！撕碎工牌后，猎头开价80万", "第" + Math.floor(Math.random()*5+15) + "版方案被冒名，她做了所有人不敢做的事"] },
      cover: { frame: "撕工牌的瞬间特写", text: "不干了！", style: "白字黑色粗描边" },
      tags: ["#短剧", "#职场逆袭", "#反转", "#真实故事"],
      publish_time: "18:00",
      copy: { line1: "改方案改到凌晨，功劳全是别人的", line2: "@你的打工人闺蜜来看逆袭", line3: "如果是你，你会怎么做？评论区见" }
    }
  };
  return outputs[stage.id] || { status: "done" };
}

function updateUI() {
  stages.forEach((s, i) => {
    const node = document.getElementById('node' + s.id);
    const label = document.getElementById('label' + s.id);
    const st = pipelineState.stages[s.id]?.status;
    node.className = 'node';
    label.className = 'label';
    if (st === 'done') { node.classList.add('done'); label.classList.add('done'); }
    if (st === 'running') { node.classList.add('running'); label.classList.add('running'); }

    if (i > 0) {
      const line = document.getElementById('line' + i);
      const prevSt = pipelineState.stages[stages[i-1].id]?.status;
      line.className = 'line';
      if (prevSt === 'done' && st === 'running') line.classList.add('running');
      else if (prevSt === 'done') line.classList.add('done');
    }
  });

  const doneCount = stages.filter(s => pipelineState.stages[s.id]?.status === 'done').length;
  document.getElementById('progressFill').style.width = ((doneCount / stages.length) * 100) + '%';
}

function updateCurrentOutput(stage, status, output, allDone) {
  const dot = document.getElementById('dotCurrent');
  dot.className = 'dot ' + (status === 'running' ? 'active' : 'done');
  const container = document.getElementById('currentOutput');

  if (allDone) {
    container.innerHTML = `
      <div style="text-align:center;padding:20px;">
        <div style="font-size:3em;">🏆</div>
        <h3 style="color:#4ade80;margin:12px 0;">全链路完成！</h3>
        <p style="color:#888;">8站专家全部就绪，项目已生成</p>
        <p style="color:#666;font-size:0.82em;margin-top:8px;">项目ID: ${pipelineState.project_id}</p>
      </div>`;
    return;
  }

  if (!stage || !output) return;

  const idx = stages.indexOf(stage) + 1;
  let html = `<h3>[Stage ${idx}/8] ${stage.emoji} ${stage.label}</h3>`;
  html += `<pre>${JSON.stringify(output, null, 2)}</pre>`;
  if (status === 'running') {
    html += `<div style="margin-top:8px;color:#a855f7;font-size:0.82em;">⏳ 执行中...</div>`;
  } else {
    html += `<div style="margin-top:8px;color:#4ade80;font-size:0.82em;">✅ 完成</div>`;
  }
  container.innerHTML = html;
}

function updateJsonOutput() {
  const container = document.getElementById('jsonOutput');
  container.innerHTML = `<pre>${JSON.stringify(pipelineState, null, 2)}</pre>`;
}

function sleep(ms) {
  return new Promise(resolve => {
    const h = setTimeout(resolve, ms);
    timeoutHandles.push(h);
  });
}

function resetPipeline() {
  timeoutHandles.forEach(clearTimeout);
  timeoutHandles = [];
  running = false;
  currentStage = -1;
  pipelineState = {};
  stages.forEach(s => {
    const node = document.getElementById('node' + s.id);
    const label = document.getElementById('label' + s.id);
    if (node) node.className = 'node';
    if (label) label.className = 'label';
  });
  for (let i = 1; i < stages.length; i++) {
    const line = document.getElementById('line' + i);
    if (line) line.className = 'line';
  }
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('resetBtn').disabled = true;
  document.getElementById('currentOutput').innerHTML = '<div class="empty-state"><div class="icon">🐚</div><div>输入你的创意，点击「一键启动」</div></div>';
  document.getElementById('jsonOutput').innerHTML = '<div class="empty-state"><div class="icon">📦</div><div>项目数据将在此展示</div></div>';
  document.getElementById('dotCurrent').className = 'dot';
}

// Init
buildPipeline();
</script>
</body>
</html>
