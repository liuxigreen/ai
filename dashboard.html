'<h3>🔍 热点发现 · 古风反串搞笑</h3><p style="color:#aaa">2026年6月15日筷子兄弟出道二十周年发布国风单曲《逍遥仙》MV。肖央变外卖员抢婚，王太利反串百花仙子。AI生成画面魔性辣眼与好听的歌形成强烈反差。网友：我手机脏了！耳朵在享受眼睛在暴击。</p><p style="color:#a5b4fc;margin-top:8px">🎯 情绪：猎奇→辣眼→破防大笑→魔性上头→怀旧鼻酸</p><p style="color:#aaa">💡 增量：原4分钟MV→1分钟聚焦外卖员闯仙界抢婚瞬间。保留反串+荒诞+AI画风，但叙事收窄到一个核心冲突。</p>',

'<h3>🎬 画面指令 · 真人写实</h3><p style="color:#a5b4fc;margin-bottom:12px">导演模式：真人写实 | 即梦 S2.0 Pro | Seed:666666 | Steps:30</p><h4>角色A：肖央（外卖员/抢婚者）</h4><p style="color:#aaa">圆偏方脸，下巴圆钝。单眼皮小眼睛，眼距偏宽，眼神温和带憨。鼻梁不高鼻头圆。嘴唇偏厚，笑起来露牙龈。偏白偏暖皮肤。标志：黑框眼镜(镜片微划痕，左镜腿汗渍腐蚀颜色偏浅)，左手食指螺丝刀旧疤。172cm/75kg，中等偏壮，站姿含胸。</p><p style="color:#888;font-size:0.82em">服装：黄色美团外卖服(拉链头掉了用回形针代替，右袖口有机油渍)。深蓝色运动鞋(鞋头磨损露出灰底)。</p><h4>角色B：王太利（百花仙子/外卖员搭档）</h4><p style="color:#aaa">偏长国字脸，下颌宽。单眼皮更小眼睛，眼裂更短。鼻梁低鼻头大。嘴唇薄，轻微地包天。小麦色偏黑皮肤，脸颊鼻头红血丝，眼角鱼尾纹深，眉心川字纹。177cm/65kg，瘦长身材。</p><p style="color:#888;font-size:0.82em">男装：白汗衫+黑短裤毛边+人字拖(右脚磨平)+叼烟+脖子白毛巾+老式银戒指(内侧刻模糊「慧」字)。</p><p style="color:#888;font-size:0.82em">女装凤冠霞帔：浓艳烟熏妆+粉底白三色号+腮红打错位置+眉不对称+假睫毛左右卷翘度不一致(左3cm右2cm)+口红涂出嘴角3mm+红盖头(布料质感差静电可见)。</p><h4>核心镜 Prompt（s07 抢婚）</h4><pre>Photorealistic live-action, medium shot. Chinese celestial wedding altar with floating cloud pedestal and golden silk banners. Foreground: open insulated food delivery container, fried rice steaming. 肖央(round face with soft jaw, small monolid eyes set wide, black-framed scratched glasses, yellow Meituan delivery uniform, paperclip zipper repair) extending disposable wooden chopsticks. 王太利(long square face, wide jaw, tiny eyes, red bridal robe, smeared smokey eye makeup, uneven false eyelashes, lipstick bleeding beyond lip line) lifting red veil, one false eyelash dangling. Behind: shocked immortal guests in Han robes. Soft natural light through carved windows, cold jade palette with warm red bridal accent. Shot on ARRI Alexa 50mm f/2.0, photorealistic silk texture, subtle film grain. Vertical 9:16. --no illustration, painting, CGI, 3D render, plastic skin, airbrushed, animation</pre>',

// Run demo
var running=false;
function show(key){
  if(running)return;
  var data=D[key];if(!data)return;
  running=true;
  // Reset all nodes
  for(var i=0;i<8;i++){
    document.getElementById('n'+i).className='node';
    document.getElementById('lb'+i).className='lbl';
    if(i>0)document.getElementById('ln'+i).className='line';
  }
  document.getElementById('pbar').style.width='0%';
  document.getElementById('out').innerHTML='';
  
  var idx=0;
  function next(){
    if(idx>=data.length){running=false;return;}
    document.getElementById('n'+idx).className='node running';
    document.getElementById('lb'+idx).className='lbl active';
    if(idx>0)document.getElementById('ln'+idx).className='line running';
    document.getElementById('pbar').style.width=((idx+1)/8*100)+'%';
    document.getElementById('out').innerHTML=data[idx];
    setTimeout(function(){
      document.getElementById('n'+idx).className='node done';
      document.getElementById('lb'+idx).className='lbl done';
      if(idx>0)document.getElementById('ln'+idx).className='line done';
      idx++;next();
    },700);
  }
  next();
}
