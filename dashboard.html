<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>女娲 · AI短剧工厂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:24px}
.header{text-align:center;padding:40px 0 20px}
.header h1{font-size:2.2em;background:linear-gradient(135deg,#a855f7,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .subtitle{color:#888;font-size:0.9em;margin-top:4px}
.input-area{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin-bottom:24px}
.input-area .row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.input-area .field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:150px}
.input-area label{font-size:0.78em;color:#888}
.input-area input,.input-area select{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#e0e0e0;padding:8px 12px;border-radius:8px;font-size:0.9em;outline:none}
.input-area input:focus,.input-area select:focus{border-color:#a855f7}
.btn{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;padding:8px 22px;border-radius:8px;font-size:0.9em;cursor:pointer;font-weight:600}
.btn:hover{box-shadow:0 4px 16px rgba(124,58,237,0.3)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.stages{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.stage{display:flex;flex-direction:column;align-items:center;flex:1;min-width:80px;max-width:110px}
.node{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3em;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);transition:all 0.3s}
.node.done{background:rgba(74,222,128,0.15);border-color:#4ade80}
.node.running{background:rgba(168,85,247,0.25);border-color:#a855f7;animation:pulse 0.8s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(168,85,247,0.4)}50%{box-shadow:0 0 0 12px rgba(168,85,247,0)}}
.label{font-size:0.65em;text-align:center;margin-top:6px;color:#666}
.label.active{color:#a855f7}
.label.done{color:#4ade80}
.connector{flex:0 0 20px;display:flex;align-items:center}
.line{flex:1;height:2px;background:rgba(255,255,255,0.06);transition:all 0.4s}
.line.done{background:#4ade80}
.line.running{background:linear-gradient(90deg,#4ade80,#a855f7)}
.progress{width:100%;height:3px;background:rgba(255,255,255,0.04);border-radius:2px;margin-bottom:24px}
.progress .fill{height:100%;background:#a855f7;border-radius:2px;transition:width 0.4s;width:0%}
.output-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;margin-bottom:16px;flex:1}
.card-header{font-size:0.8em;color:#888;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#333}
.dot.done{background:#4ade80}
.dot.running{background:#a855f7;animation:pulse 0.8s infinite}
.dual-panel{display:flex;gap:16px}
.dual-panel>*{flex:1}
.tag{display:inline-block;background:rgba(168,85,247,0.12);color:#a855f7;font-size:0.72em;padding:2px 8px;border-radius:10px;margin:0 4px 4px 0}
pre{font-size:0.7em;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto}
@media(max-width:768px){.dual-panel{flex-direction:column}.stage{min-width:50px;max-width:80px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>女娲 · AI短剧工厂</h1>
    <p class="subtitle">热点→编剧→画面→生图→生视频→剪辑→声音→发布</p>
  </div>

  <div class="input-area">
    <div class="row">
      <div class="field" style="flex:1.2">
        <label>📂 历史项目</label>
        <select id="historySelect">
          <option value="">-- 选历史项目 --</option>
          <option value="kuaizi">🥢 筷子兄弟逍遥仙</option>
          <option value="zhangxue">🏍️ 张雪机车·逆袭</option>
          <option value="marriage">💔 八年婚姻谎言</option>
        </select>
      </div>
      <div class="field" style="flex:2">
        <label>🔍 创意</label>
        <input id="ideaInput" placeholder="筷子兄弟逍遥仙" value="筷子兄弟逍遥仙">
      </div>
      <div class="field" style="flex:1">
        <label>🎥 风格</label>
        <select id="styleSelect">
          <option value="realistic" selected>真人写实</option>
          <option value="cultivation">国漫修仙</option>
          <option value="wong">王家卫</option>
          <option value="anderson">韦斯·安德森</option>
          <option value="apocalyptic">末世科幻</option>
        </select>
      </div>
      <button class="btn" id="startBtn">▶ 一键启动</button>
      <button class="btn" id="resetBtn" style="background:rgba(255,255,255,0.08);color:#ccc;display:none">↻ 重置</button>
    </div>
  </div>

  <div class="pipeline">
    <div class="stages" id="stagesContainer"></div>
    <div class="progress"><div class="fill" id="progressFill"></div></div>
  </div>

  <div class="dual-panel">
    <div class="output-card">
      <div class="card-header"><span class="dot" id="dotCurrent"></span>当前输出</div>
      <div id="currentOutput" style="font-size:0.85em;color:#999">输入创意，点击「一键启动」</div>
    </div>
    <div class="output-card">
      <div class="card-header">📋 操作指南</div>
      <div id="stepsOutput" style="font-size:0.85em;color:#999">启动完成后显示分步操作</div>
    </div>
  </div>
</div>

<script>
// ====== DATA ======
var currentDemo = 'kuaizi';

  {stage:'🎬 画面指令', html:'<b style="color:#a5b4fc">真人写实模式</b><br><br><b>肖央</b>: 圆偏方脸/单眼皮小眼/黑框眼镜(镜片划痕)/黄美团外卖服(拉链头回形针)/左食指旧疤<br><b>王太利</b>: 偏长国字脸/更小眼/嘴唇薄地包天。<br>女装: 凤冠霞帔+浓艳烟熏妆+假睫毛左3cm右2cm+口红涂出嘴角3mm<br><br>⭐ 核心镜Prompt: <pre>Photorealistic live-action. Wedding altar. 肖央(round face, small monolid eyes, scratched glasses, yellow Meituan uniform) opens delivery box, fried rice steaming. Hands chopsticks to 王太利(long square face, red bridal robe, smeared makeup). Shot on ARRI Alexa 50mm f/2.0. --no CGI</pre>'},

],

  {stage:'🔍 热点发现', html:'<b style="color:#a5b4fc">都市热血逆袭</b><br><br>📰 张雪是凯越机车联合创始人。董事会以1076万回购他35%股份。他带着三个旧部在铁皮厂房重新开始。一年后法国赛道夺冠，张雪机车估值10亿。<br><br>🎯 情绪：被背叛的不甘→从零再来的孤勇→赛道夺冠的释放<br>💡 增量：不报复只做事。从头到尾没说前公司一句坏话——只是车更快人更拼'},
  {stage:'✍️ 编剧(9镜)', html:'<b>9镜 · 2分钟 · 都市热血逆袭</b><br>1.中景 深夜会议室被通知回购股份签字离开<br>2.中景 三个月后铁皮厂房漏雨重新造车<br>3.中景 第137天凌晨4点第一台发动机点燃<br>4.中景 发布会不到一百人：这是我的车试试<br>5.远景 法国赛道雨中超车<br>6.中景 终点冲刺老赵哭成孩子张雪手搭肩<br>7.中景 凯越总部高管沉默股价在跌<br>8.中景 第二年发布会上千人背景墙张雪机车<br>9.POV 驾驶舱前方公路弯道·这一秒你追不上'},
  {stage:'🎬 画面指令', html:'<b style="color:#a5b4fc">真人写实模式</b><br><br><b>张雪</b>: 方正国字脸/厚黑框眼镜(镜片划痕)/额头横纹/脸颊痘坑/前臂焊接烫伤/手掌粗糙虎口老茧/指甲黑机油渍/左腕卡西欧Gshock表蒙裂纹<br><b>老赵</b>: 圆脸娃娃脸/浓眉大眼/右耳旧疤/褪色红头巾<br><br><pre>Photorealistic. Night boardroom. 38yo man(square jaw, thick scratched glasses, callused hands black under nails, welding burns, cracked Gshock) in denim jacket, signs contract 1076万. Shot on 50mm. --no CGI</pre>'},
  {stage:'🖼️ 生图执行', html:'<b>即梦 S2.0 Pro</b> · Seed:777777 · Steps:30<br>张雪定妆照(国字脸/黑框眼镜/牛仔夹克)+老赵定妆照(圆脸/红头巾/右耳伤疤)'},
  {stage:'🎥 生视频', html:'<b>可灵 3.0</b><br>静态为主。s05赛车手持微抖。s06手持静态雨滴镜头边缘'},
  {stage:'✂️ 剪辑', html:'<b>时间线</b>: 0-15s压抑→15-35s重启→35-55s点燃→55-70s发布→70-95s赛道→95-115s终点→115-120s留白'},
  {stage:'🎵 声音', html:'<b>BGM</b>: 低沉弦乐→渐强电子节拍→鼓点爆发→钢琴收尾<br><b>音效</b>: 签字笔/焊接火花/发动机点火/雨声/冲线蜂鸣/黑屏静默1秒'},
  {stage:'🚀 发布', html:'<b>标题</b>: 他值10个亿，但手上还洗不掉机油的黑色<br>🏷️ #短剧 #逆袭 #机车 #张雪机车 #热血<br>⏰ 18:00首发'}
],
marriage:[
  {stage:'🔍 热点发现', html:'<b style="color:#a5b4fc">都市情感/婚姻悬疑</b><br><br>📰 虎扑热帖#4 52万热度。老公发现结婚八年的妻子婚前三年的恋情从未告知。帖主没有大吵大闹：\'你从来没有相信过我——你替我做了一个我根本没机会做的选择。\'<br><br>🎯 情绪：被背叛的愤怒→信任崩塌后的空旷感<br>💡 增量：不报复不离婚——留下来但不爱了'},
  {stage:'✍️ 编剧(9镜)', html:'<b>9镜 · 2分钟 · 都市情感</b><br>1.中景 周六修台灯。手机响：你老婆认识你之前...<br>2.近景 深夜翻她QQ空间照片日期认识前三个月<br>3.中景 清晨厨房。煎蛋。锅铲停了。蛋焦了。<br>4.中景 阳台。她：三年。怕你不要我。他取下眼镜。<br>5.中景 客厅。我不怪以前的事。我怪你从不信我。<br>6.中景 一周后。女儿问：怎么不说话？螺丝拧错方向。<br>7.中景 同床背对背。她碰他背：会原谅我吗？会的。<br>8.远景 公园。拍照。没发朋友圈。锁屏。起身。<br>9.特写 婚纱照褪成黑白。他选择了留下。但爱可以。'},
  {stage:'🎬 画面指令', html:'<b style="color:#a5b4fc">真人写实模式</b><br><br><b>陈远</b>: 偏长国字脸/细框钛合金老花镜(镜片微划痕)/额头浅抬头纹/嘴角淡色素痣/左手食指螺丝刀旧疤/灰圆领棉T恤领口微松<br><b>她</b>: 瓜子脸/双眼皮大眼/鼻梁两侧淡淡雀斑/粉纯棉家居服/左手朴素婚戒<br><br><pre>Photorealistic. Night bedroom overhead. Two figures back to back, one body width between them. Red alarm clock 2:47AM. Moonlight through curtain. Shot on 35mm, high ISO grain. --no CGI</pre>'},
  {stage:'🖼️ 生图执行', html:'<b>即梦 S2.0 Pro</b> · Seed:444444 · Steps:30<br>陈远(偏长方脸/细框老花镜/灰T恤)+她(瓜子脸/雀斑/粉睡衣)'},
  {stage:'🎥 生视频', html:'<b>可灵 3.0</b><br>全程固定极慢推。s05窗边固定。s07俯拍缓慢下降。s08远摄微抖'},
  {stage:'✂️ 剪辑', html:'<b>时间线</b>: 0-20s平静→20-40s挖掘→40-70s对峙→70-100s坦白→100-115s裂痕→115-120s照片褪色'},
  {stage:'🎵 声音', html:'<b>BGM</b>: 静默+低音大提琴→钢琴单音→弦乐渐弱至静默<br><b>音效</b>: 螺丝刀/QQ消息/煎蛋滋滋→静默'},
  {stage:'🚀 发布', html:'<b>标题</b>: 结婚第八年，我才发现她从没对我说过真话<br>🏷️ #短剧 #婚姻 #情感 #真实故事 #人性<br>⏰ 20:00'}
]
};

// ====== BUILD ======
var stages = ['热点发现','短剧编剧','画面指令','生图执行','生视频','剪辑节奏','声音设计','发布运营'];
var emojis = ['🔍','✍️','🎬','🖼️','🎥','✂️','🎵','🚀'];
var ids = ['hotspot','script','cinema','image','video','editing','sound','publish'];

function build() {
  var c = document.getElementById('stagesContainer');
  c.innerHTML = '';
  for (var i = 0; i < stages.length; i++) {
    if (i > 0) {
      var conn = document.createElement('div'); conn.className = 'connector';
      conn.innerHTML = '<div class="line" id="line' + i + '"></div>';
      c.appendChild(conn);
    }
    var div = document.createElement('div'); div.className = 'stage';
    div.innerHTML = '<div class="node" id="node' + ids[i] + '">' + emojis[i] + '</div><div class="label" id="label' + ids[i] + '">' + stages[i] + '</div>';
    c.appendChild(div);
  }
}
build();

// ====== RUN ======
var running = false;

function resetUI() {
  for (var i = 0; i < stages.length; i++) {
    var n = document.getElementById('node' + ids[i]); if (n) n.className = 'node';
    var l = document.getElementById('label' + ids[i]); if (l) l.className = 'label';
    if (i > 0) { var ln = document.getElementById('line' + i); if (ln) ln.className = 'line'; }
  }
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentOutput').innerHTML = '<span style="color:#999">输入创意，点击「一键启动」</span>';
  document.getElementById('stepsOutput').innerHTML = '<span style="color:#999">启动完成后显示分步操作</span>';
  document.getElementById('dotCurrent').className = 'dot';
}

function start() {
  if (running) return;
  var idea = document.getElementById('ideaInput').value.trim();
  if (!idea) { alert('请先输入创意'); return; }
  
  running = true;
  document.getElementById('startBtn').disabled = true;
  resetUI();
  
  var data = DATA[currentDemo];
  if (!data || data.length < 8) { alert('数据未加载'); running = false; return; }
  
  var i = 0;
  document.getElementById('dotCurrent').className = 'dot running';
  
  function next() {
    if (i >= data.length) {
      running = false;
      document.getElementById('startBtn').disabled = false;
      document.getElementById('dotCurrent').className = 'dot done';
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('stepsOutput').innerHTML = '<b style="color:#4ade80">✅ 全链路完成</b><br><br>1. 角色定妆照 → 按角色卡去即梦出图<br>2. 12镜分镜图 → 逐条Prompt贴即梦<br>3. 视频片段 → 上传分镜图到可灵<br>4. 剪辑+声音+发布 → 剪映/发布方案复制';
      document.getElementById('currentOutput').innerHTML = '<div style="text-align:center;font-size:2em">🏆</div><p style="text-align:center;color:#4ade80;font-size:1.2em">全链路完成！</p>';
      return;
    }
    
    var node = document.getElementById('node' + ids[i]);
    var label = document.getElementById('label' + ids[i]);
    if (node) { node.className = 'node running'; }
    if (label) { label.className = 'label active'; }
    if (i > 0) { var ln = document.getElementById('line' + i); if (ln) ln.className = 'line running'; }
    
    var progress = ((i + 1) / data.length * 100) + '%';
    document.getElementById('progressFill').style.width = progress;
    
    document.getElementById('currentOutput').innerHTML = '<h4 style="color:#a855f7;margin-bottom:8px">' + data[i].stage + '</h4>' + data[i].html + '<p style="color:#4ade80;font-size:0.75em;margin-top:8px">✅ 完成</p>';
    
    setTimeout(function() {
      if (node) node.className = 'node done';
      if (label) label.className = 'label done';
      if (i > 0) { var ln = document.getElementById('line' + i); if (ln) ln.className = 'line done'; }
      i++; next();
    }, 600);
  }
  next();
}

function loadDemo(key) {
  if (!key) return;
  currentDemo = key;
  var titles = {kuaizi:'筷子兄弟逍遥仙', zhangxue:'张雪机车', marriage:'八年婚姻谎言'};
  document.getElementById('ideaInput').value = titles[key] || '';
}

// Event listeners (use addEventListener instead of onclick for sandbox compatibility)
document.getElementById('startBtn').addEventListener('click', start);
document.getElementById('resetBtn').addEventListener('click', function(){ resetUI(); document.getElementById('startBtn').disabled = false; });
document.getElementById('historySelect').addEventListener('change', function(){ loadDemo(this.value); });
</script>
